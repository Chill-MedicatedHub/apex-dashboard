name: Scrape Apex Sales

on:
  schedule:
    # Run every 15 min — using 4 separate triggers because GitHub's free
    # tier cron drops single-trigger jobs more often than multi-trigger ones
    - cron: '0,15,30,45 * * * *'
    - cron: '5 * * * *'
    - cron: '20 * * * *'
    - cron: '35 * * * *'
    - cron: '50 * * * *'
  workflow_dispatch:
  push:
    branches: [main]    # also runs on any code commit (for testing)

permissions:
  contents: write

concurrency:
  group: scrape-apex
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APEX_COOKIE: ${{ secrets.APEX_COOKIE }}
          APEX_USER_ID: ${{ secrets.APEX_USER_ID }}
          APEX_COMPANY_ID: ${{ secrets.APEX_COMPANY_ID }}
          APEX_ROW_LIMIT: '50000'
          APEX_FROM_DATE: '2025-05-01'
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sales_data.json
          git diff --staged --quiet || git commit -m "Auto-update sales_data.json [skip ci]"
          git push
